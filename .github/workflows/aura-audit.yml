name: Aura Fairness Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit-model:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Build and start Docker services
      run: docker-compose up -d backend
      
    - name: Wait for backend to be ready
      run: sleep 10
      
    - name: Run Fairness Audit Script
      run: |
        echo "Creating mock data for audit..."
        cat << 'EOF' > test_data.csv
        age,workclass,fnlwgt,education,education-num,marital-status,occupation,relationship,race,sex,capital-gain,capital-loss,hours-per-week,native-country,income
        39,State-gov,77516,Bachelors,13,Never-married,Adm-clerical,Not-in-family,White,Male,2174,0,40,United-States,<=50K
        50,Self-emp-not-inc,83311,Bachelors,13,Married-civ-spouse,Exec-managerial,Husband,White,Male,0,0,13,United-States,<=50K
        38,Private,215646,HS-grad,9,Divorced,Handlers-cleaners,Not-in-family,White,Male,0,0,40,United-States,<=50K
        53,Private,234721,11th,7,Married-civ-spouse,Handlers-cleaners,Husband,Black,Male,0,0,40,United-States,<=50K
        EOF
        
        echo "Uploading data to Aura Engine..."
        curl -X POST http://localhost:8000/api/v1/upload \
          -F "file=@test_data.csv" \
          -F "target_col=income" \
          -F "protected_cols=sex" \
          -F "drop_cols=fnlwgt" \
          -F "sample_mode=Deep Audit (All rows)"
          
        echo "Fetching Arena metrics and validating fairness..."
        python scripts/fairness_check.py
